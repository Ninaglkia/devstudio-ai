<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagamento Completato — DevStudio AI</title>
  <meta name="theme-color" content="#050505">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #050505;
      color: #f4f4f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .success-card {
      max-width: 500px;
      padding: 3rem 2.5rem;
      border-radius: 20px;
      border: 1px solid rgba(109, 92, 255, 0.3);
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(12px);
    }
    .check-icon {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(0, 230, 118, 0.15);
      border: 2px solid rgba(0, 230, 118, 0.4);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes pop {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }
    .check-icon svg { width: 40px; height: 40px; stroke: #00e676; fill: none; stroke-width: 2.5; }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      color: #a1a1aa;
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 2rem;
      border-radius: 10px;
      background: #6d5cff;
      color: white;
      text-decoration: none;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.3s;
    }
    .btn-home:hover {
      background: #8b7dff;
      box-shadow: 0 10px 30px rgba(109, 92, 255, 0.4);
    }
  </style>
</head>
<body>
  <div class="success-card">
    <div class="check-icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Pagamento Completato!</h1>
    <p>Grazie per aver scelto DevStudio AI. Ti contatteremo entro 24 ore su WhatsApp per iniziare a lavorare al tuo progetto.</p>
    <a href="/" class="btn-home">Torna alla Home</a>
  </div>
</body>
</html>
